    &lt;h1&gt;AlvorKit ECS full framework benchmark report&lt;/h1&gt;
    &lt;p class=&quot;lede&quot;&gt;
      All seven benchmark classes, every discovered framework method, and every normal parameter combination in
      Ecs.CSharp.Benchmark. The requested shorter job uses one launch, one warmup, one measured iteration, and one invocation
      per case. It is comprehensive coverage, but it is a one-sample performance survey rather than a statistically stable ranking.
    &lt;/p&gt;

  &lt;section&gt;
    &lt;h2&gt;How to read this report&lt;/h2&gt;
    &lt;ul&gt;
      &lt;li&gt;All values are the single measured execution of a 100,000-Ent operation after one warmup; lower is better.&lt;/li&gt;
      &lt;li&gt;Charts use logarithmic width because the full suite spans microseconds to hundreds of milliseconds. Labels show exact values.&lt;/li&gt;
      &lt;li&gt;System “best by implementation” charts choose the fastest measured method belonging to each ECS for that workload and padding.&lt;/li&gt;
      &lt;li&gt;Those best-method charts compare each package at its strongest included path, which may be scalar, SIMD, job-based, or multi-threaded.&lt;/li&gt;
      &lt;li&gt;The exact-result section retains every method, including slower delegate, enumerable, point-access, generated, and multi-thread variants.&lt;/li&gt;
      &lt;li&gt;Error and standard deviation are unavailable with one measured iteration. Small gaps must not be treated as conclusive.&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;callout&quot;&gt;
      &lt;p&gt;
        The earlier stabilized AlvorKit-focused results remain useful for hot-path conclusions, but they are not mixed into these charts.
        This report is internally consistent: every displayed performance number comes from the same complete quick-run configuration.
      &lt;/p&gt;
    &lt;/div&gt;
  &lt;/section&gt;

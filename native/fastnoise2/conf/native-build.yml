kind: cmake
sourcePatches:
  - path: src/CMakeLists.txt
    search: fastsimd_create_dispatch_library(FastSIMD_FastNoise ${FASTSIMD_RELAXED} SOURCES "FastNoise/FastSIMD_Build.inl")
    replace: fastsimd_create_dispatch_library(FastSIMD_FastNoise ${FASTSIMD_RELAXED} SOURCES "FastNoise/FastSIMD_Build.inl" ${FASTNOISE2_FASTSIMD_FEATURE_SETS})
  - path: src/CMakeLists.txt
    search: target_compile_options(FastSIMD_FastNoise PRIVATE -mno-vzeroupper)
    replace: |
      if(CMAKE_SYSTEM_PROCESSOR MATCHES "^(x86_64|AMD64|i[3-6]86)$")
              target_compile_options(FastSIMD_FastNoise PRIVATE -mno-vzeroupper)
          endif()
windows:
  cmakeOutput: src/bin/FastNoise.dll
  cmakeOptions:
    - -DCMAKE_C_COMPILER=clang-cl
    - -DCMAKE_CXX_COMPILER=clang-cl
    - -DBUILD_SHARED_LIBS=ON
    - -DFASTNOISE2_TOOLS=OFF
    - -DFASTNOISE2_TESTS=OFF
    - -DFASTNOISE2_UTILITY=OFF
    - -DCMAKE_RUNTIME_OUTPUT_DIRECTORY=bin
    - -DCMAKE_LIBRARY_OUTPUT_DIRECTORY=bin
    - -DCMAKE_ARCHIVE_OUTPUT_DIRECTORY=lib
  allowedDependencies:
    - KERNEL32.dll
    - VCRUNTIME140.dll
    - VCRUNTIME140_1.dll
    - MSVCP140.dll
linux:
  cmakeOutput: src/bin/libFastNoise.so
  packages:
    - build-essential
    - cmake
  armArchitecture: armhf
  armPackages:
    - gcc-arm-linux-gnueabihf
    - g++-arm-linux-gnueabihf
  cmakeOptions:
    - -DBUILD_SHARED_LIBS=ON
    - -DFASTNOISE2_TOOLS=OFF
    - -DFASTNOISE2_TESTS=OFF
    - -DFASTNOISE2_UTILITY=OFF
    - -DCMAKE_RUNTIME_OUTPUT_DIRECTORY=bin
    - -DCMAKE_LIBRARY_OUTPUT_DIRECTORY=bin
    - -DCMAKE_ARCHIVE_OUTPUT_DIRECTORY=lib
  ridCMakeOptions:
    linux-x64:
      - -DFASTNOISE2_FASTSIMD_FEATURE_SETS=FEATURE_SETS;SSE2;SSE41;AVX2;AVX512
    linux-arm64:
      - -DCMAKE_CXX_FLAGS=-DFASTSIMD_MAX_FEATURE_SET=SCALAR -DFASTSIMD_DEFAULT_FEATURE_SET=SCALAR
      - -DFASTNOISE2_FASTSIMD_FEATURE_SETS=FEATURE_SETS;SCALAR
    linux-arm:
      - -DCMAKE_CXX_FLAGS=-DFASTSIMD_MAX_FEATURE_SET=SCALAR -DFASTSIMD_DEFAULT_FEATURE_SET=SCALAR
      - -DFASTNOISE2_FASTSIMD_FEATURE_SETS=FEATURE_SETS;SCALAR
  allowedDependencies:
    - ld-linux
    - libc.so.6
    - libm.so.6
    - libstdc++.so.6
    - libgcc_s.so.1
macos:
  cmakeOutput: src/bin/libFastNoise.dylib
  cmakeOptions:
    - -DBUILD_SHARED_LIBS=ON
    - -DFASTNOISE2_TOOLS=OFF
    - -DFASTNOISE2_TESTS=OFF
    - -DFASTNOISE2_UTILITY=OFF
    - -DCMAKE_RUNTIME_OUTPUT_DIRECTORY=bin
    - -DCMAKE_LIBRARY_OUTPUT_DIRECTORY=bin
    - -DCMAKE_ARCHIVE_OUTPUT_DIRECTORY=lib

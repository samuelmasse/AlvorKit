# Builds and publishes the native runtime NuGet packages.
#
# Release rule:
# - automatic pushes only run when a native package version marker changes.
# - each push release builds only the libraries whose version/TAG or version/REVISION changed.
# - after a native package is published, the matching managed C-header binding
#   package is generated and published from the same changed-library set.
#
# Manual runs are useful for producing artifacts and validating the native build,
# but they do not publish packages.
name: native packages

on:
  # Manual dispatch lets you build one package, or all packages, on demand.
  workflow_dispatch:
    inputs:
      library:
        description: Native library to build
        required: true
        default: all
        type: choice
        options:
          - all
          - freetype
          - glfw
          - miniaudio
          - xxhash

  # Push releases are intentionally tied only to native version files.
  # Generator, source, project, and workflow edits should be validated elsewhere;
  # they should not create a NuGet release unless a version marker also changes.
  push:
    branches: [main]
    paths:
      [
        "native/freetype/version/TAG",
        "native/freetype/version/REVISION",
        "native/glfw/version/TAG",
        "native/glfw/version/REVISION",
        "native/miniaudio/version/TAG",
        "native/miniaudio/version/REVISION",
        "native/xxhash/version/TAG",
        "native/xxhash/version/REVISION",
      ]

# The workflow only reads repository contents. Publishing uses the NuGet API key,
# not elevated GitHub repository permissions.
permissions:
  contents: read

# Native releases are expensive and publish immutable package versions, so do not
# cancel an older in-flight release when a newer push arrives on the same ref.
concurrency:
  group: native-packages-${{ github.ref }}
  cancel-in-progress: false

# Keep dotnet output quiet and deterministic across all jobs.
env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  # Figures out which native packages actually need work.
  # Later jobs consume the JSON matrix emitted by this job, so one freetype bump
  # no longer builds or publishes glfw, miniaudio, and xxhash by accident.
  detect:
    runs-on: ubuntu-24.04
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
      has_packages: ${{ steps.detect.outputs.has_packages }}
    steps:
      # Full history is needed so the script can compare the previous and new
      # main commits for push events.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Builds the package metadata matrix used by build, pack, and bindings.
      # On push, it also fails early if the requested native package version is
      # already on NuGet.org.
      - name: Detect native packages to release
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          # Manual runs trust the selected input; push runs derive the selection
          # from changed version/TAG or version/REVISION files.
          selected=()
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            selection="${{ inputs.library }}"
            if [[ "$selection" == "all" ]]; then
              selected=(freetype glfw miniaudio xxhash)
            else
              selected=("$selection")
            fi
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
              mapfile -t changed < <(git diff-tree --no-commit-id --name-only -r "$head")
            else
              mapfile -t changed < <(git diff --name-only "$base" "$head")
            fi

            # Only version/TAG and version/REVISION are native-package release signals.
            for library in freetype glfw miniaudio xxhash; do
              if printf '%s\n' "${changed[@]}" | grep -Eq "^native/${library}/version/(TAG|REVISION)$"; then
                selected+=("$library")
              fi
            done
          fi

          # Convert each selected library into a JSON object with all names the
          # downstream jobs need: native package ID, native project, and binding
          # package/project IDs.
          objects=()
          for library in "${selected[@]}"; do
            case "$library" in
              freetype)
                package_id="alvorkit.freetype.native"
                project="AlvorKit.FreeType.Native.csproj"
                package_name="AlvorKit.FreeType.Native"
                binding_id="alvorkit.freetype"
                api_project="AlvorKit.FreeType"
                backend_project="AlvorKit.FreeType.Backend"
                ;;
              glfw)
                package_id="alvorkit.glfw.native"
                project="AlvorKit.GLFW.Native.csproj"
                package_name="AlvorKit.GLFW.Native"
                binding_id="alvorkit.glfw"
                api_project="AlvorKit.GLFW"
                backend_project="AlvorKit.GLFW.Backend"
                ;;
              miniaudio)
                package_id="alvorkit.miniaudio.native"
                project="AlvorKit.MiniAudio.Native.csproj"
                package_name="AlvorKit.MiniAudio.Native"
                binding_id="alvorkit.miniaudio"
                api_project="AlvorKit.MiniAudio"
                backend_project="AlvorKit.MiniAudio.Backend"
                ;;
              xxhash)
                package_id="alvorkit.xxhash.native"
                project="AlvorKit.XxHash.Native.csproj"
                package_name="AlvorKit.XxHash.Native"
                binding_id="alvorkit.xxhash"
                api_project="AlvorKit.XxHash"
                backend_project="AlvorKit.XxHash.Backend"
                ;;
              *)
                echo "::error::Unknown native library '$library'."
                exit 1
                ;;
            esac

            # NuGet versions are immutable. Fail before starting the large build
            # matrix if the requested push release already exists.
            if [[ "${{ github.event_name }}" == "push" ]]; then
              version="$(tr -d '[:space:]' < "native/${library}/version/TAG")"
              revision="$(tr -d '[:space:]' < "native/${library}/version/REVISION" 2>/dev/null || true)"
              [[ -n "$revision" ]] && version="${version}.${revision}"
              versions="$(curl -fsSL "https://api.nuget.org/v3-flatcontainer/${package_id}/index.json" || echo '{"versions":[]}')"
              if jq -e --arg version "$version" '.versions | index($version)' <<< "$versions" > /dev/null; then
                echo "::error::${package_name} ${version} is already published - bump native/${library}/version/TAG or version/REVISION."
                exit 1
              fi
            fi

            objects+=("$(jq -cn \
              --arg library "$library" \
              --arg package_id "$package_id" \
              --arg project "$project" \
              --arg package_name "$package_name" \
              --arg binding_id "$binding_id" \
              --arg api_project "$api_project" \
              --arg backend_project "$backend_project" \
              '{library:$library,package_id:$package_id,project:$project,package_name:$package_name,binding_id:$binding_id,api_project:$api_project,backend_project:$backend_project}')")
          done

          # Write compact JSON to GITHUB_OUTPUT so fromJson(...) can build the
          # dynamic matrices in later jobs.
          packages="$(printf '%s\n' "${objects[@]}" | jq -s -c '.')"
          echo "packages=$packages" >> "$GITHUB_OUTPUT"
          if [[ "$packages" == "[]" ]]; then
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
            echo "No native package version files changed."
          else
            echo "has_packages=true" >> "$GITHUB_OUTPUT"
            echo "Selected packages: $(jq -r 'map(.library) | join(", ")' <<< "$packages")"
          fi

  # Compiles each selected native library for every runtime identifier the
  # package supports. Each matrix cell uploads only that library/RID's runtimes.
  build:
    needs: [detect]
    if: needs.detect.outputs.has_packages == 'true'
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect.outputs.packages) }}
        target:
          - { runner: windows-latest, rid: win-x64 }
          - { runner: windows-latest, rid: win-x86 }
          - { runner: windows-11-arm, rid: win-arm64 }
          - { runner: ubuntu-24.04, rid: linux-x64 }
          - { runner: ubuntu-24.04-arm, rid: linux-arm64 }
          - { runner: ubuntu-24.04-arm, rid: linux-arm }
          - { runner: macos-26, rid: osx-arm64 }
          - { runner: macos-26-intel, rid: osx-x64 }
    runs-on: ${{ matrix.target.runner }}
    steps:
      # Check out the source and install the SDK used by the native build script.
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      # The C# native build script downloads upstream source, compiles the target
      # RID, verifies dependencies, and writes native/<library>/runtimes.
      - name: Build native runtime
        run: dotnet run --project scripts/AlvorKit.Script.NativeBuild -- build ${{ matrix.package.library }} --rid ${{ matrix.target.rid }}

      # Save this RID's runtime output for the Ubuntu pack job, which combines
      # all RIDs into one NuGet package for the selected library.
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.package.library }}-${{ matrix.target.rid }}
          path: native/${{ matrix.package.library }}/runtimes
          if-no-files-found: error

  # Downloads all runtime artifacts for one selected library and packs the native
  # NuGet package. Push-triggered runs publish; manual runs stop at artifacts.
  pack:
    needs: [detect, build]
    if: needs.detect.outputs.has_packages == 'true'
    timeout-minutes: 30
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect.outputs.packages) }}
    steps:
      # Check out the package project and install the SDK used by dotnet build.
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      # Collect the per-RID artifacts under the library's runtimes/ directory so
      # MSBuild can include them in the native package.
      - uses: actions/download-artifact@v8
        with:
          pattern: ${{ matrix.package.library }}-*
          path: native/${{ matrix.package.library }}/runtimes
          merge-multiple: true

      # The native projects have GeneratePackageOnBuild enabled, so build emits
      # the .nupkg after validating that runtimes/ is populated.
      - name: Pack native package
        run: dotnet build -c Release native/${{ matrix.package.library }}/${{ matrix.package.project }}

      # Upload the native .nupkg whether this is a manual run or a push release.
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.package.library }}-nupkg
          path: bin/${{ matrix.package.package_name }}/Release/*.nupkg
          if-no-files-found: error

      # Only main pushes publish to NuGet.org. workflow_dispatch stays artifact-only.
      - name: Publish native package to NuGet.org
        if: github.event_name == 'push'
        run: dotnet nuget push bin/${{ matrix.package.package_name }}/Release/*.nupkg --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

  # Publishes the managed C-header bindings that correspond to native packages
  # just released by this workflow. This keeps native version/TAG or version/REVISION bumps from
  # relying on a separate workflow_run trigger.
  bindings:
    needs: [detect, pack]
    if: needs.detect.outputs.has_packages == 'true' && github.event_name == 'push'
    timeout-minutes: 30
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect.outputs.packages) }}
    steps:
      # Check out source metadata and install the SDK used by the bindgen tool.
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      # Derive both package versions from marker files. Binding version uses
      # version/BINDING_REVISION when present, otherwise it follows version/REVISION.
      - name: Compute binding package versions
        id: versions
        shell: bash
        run: |
          set -euo pipefail
          dir="native/${{ matrix.package.library }}/version"
          tag="$(tr -d '[:space:]' < "$dir/TAG")"
          native_revision="$(tr -d '[:space:]' < "$dir/REVISION" 2>/dev/null || true)"
          binding_revision="$(tr -d '[:space:]' < "$dir/BINDING_REVISION" 2>/dev/null || true)"
          [[ -z "$binding_revision" ]] && binding_revision="$native_revision"
          native_version="$tag"
          binding_version="$tag"
          [[ -n "$native_revision" ]] && native_version="${native_version}.${native_revision}"
          [[ -n "$binding_revision" ]] && binding_version="${binding_version}.${binding_revision}"
          echo "native=$native_version" >> "$GITHUB_OUTPUT"
          echo "binding=$binding_version" >> "$GITHUB_OUTPUT"

          # If the matching binding package version is already published, skip
          # bindgen/pack/publish. This matters when a native packaging revision
          # changes but binding version intentionally stays put.
          versions="$(curl -fsSL "https://api.nuget.org/v3-flatcontainer/${{ matrix.package.binding_id }}/index.json" || echo '{"versions":[]}')"
          if jq -e --arg version "$binding_version" '.versions | index($version)' <<< "$versions" > /dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "${{ matrix.package.binding_id }} ${binding_version} is already published; skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # NuGet indexing can lag immediately after native publish, so wait briefly
      # for the native package that the generated backend references.
      - name: Wait for native package on NuGet.org
        if: steps.versions.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..12}; do
            versions="$(curl -fsSL "https://api.nuget.org/v3-flatcontainer/${{ matrix.package.package_id }}/index.json" || echo '{"versions":[]}')"
            if jq -e --arg version "${{ steps.versions.outputs.native }}" '.versions | index($version)' <<< "$versions" > /dev/null; then
              exit 0
            fi
            echo "Waiting for ${{ matrix.package.package_id }} ${{ steps.versions.outputs.native }} on NuGet.org ($attempt/12)..."
            sleep 10
          done
          echo "::error::${{ matrix.package.package_id }} ${{ steps.versions.outputs.native }} is not on NuGet.org yet."
          exit 1

      # Generate strict bindings against the native package version that was
      # just published, including export verification.
      - name: Generate bindings
        if: steps.versions.outputs.skip != 'true'
        run: dotnet run --project scripts/AlvorKit.Script.Bindgen -- ${{ matrix.package.library }} --strict

      # Pack both generated projects: the public API package and the backend
      # package that references the native runtime package.
      - name: Pack bindings
        if: steps.versions.outputs.skip != 'true'
        run: |
          dotnet pack -c Release out/bindgen/${{ matrix.package.api_project }}/${{ matrix.package.api_project }}.csproj
          dotnet pack -c Release out/bindgen/${{ matrix.package.backend_project }}/${{ matrix.package.backend_project }}.csproj

      # Save generated binding packages as artifacts for audit/debugging.
      - uses: actions/upload-artifact@v7
        if: steps.versions.outputs.skip != 'true'
        with:
          name: ${{ matrix.package.library }}-bindings-nupkg
          path: |
            bin/${{ matrix.package.api_project }}/Release/*.nupkg
            bin/${{ matrix.package.backend_project }}/Release/*.nupkg
          if-no-files-found: error

      # Publish both binding packages after the native package is visible.
      - name: Publish bindings to NuGet.org
        if: steps.versions.outputs.skip != 'true' && github.event_name == 'push'
        run: |
          dotnet nuget push bin/${{ matrix.package.api_project }}/Release/*.nupkg --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push bin/${{ matrix.package.backend_project }}/Release/*.nupkg --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

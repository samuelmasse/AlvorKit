name: RGFW native package

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['native/rgfw/TAG', 'native/rgfw/bindgen.json', 'native/rgfw/REVISION', 'native/rgfw/rgfw.c', 'native/rgfw/*.csproj', 'native/rgfw/scripts/**']

permissions:
  contents: read

jobs:
  build-windows:
    strategy:
      matrix:
        include:
          - { runner: windows-latest, arch: x64 }
          - { runner: windows-latest, arch: x86 }
          - { runner: windows-11-arm, arch: arm64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - run: pwsh native/rgfw/scripts/build-win.ps1 -Arch ${{ matrix.arch }}
      - uses: actions/upload-artifact@v7
        with:
          name: win-${{ matrix.arch }}
          path: native/rgfw/runtimes/win-${{ matrix.arch }}
          if-no-files-found: error

  build-linux:
    strategy:
      matrix:
        include:
          - { runner: ubuntu-24.04, rid: linux-x64 }
          - { runner: ubuntu-24.04-arm, rid: linux-arm64 }
          - { runner: ubuntu-24.04-arm, rid: linux-arm, args: arm }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - run: bash native/rgfw/scripts/build-linux.sh ${{ matrix.args }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.rid }}
          path: native/rgfw/runtimes/${{ matrix.rid }}
          if-no-files-found: error

  build-macos:
    strategy:
      matrix:
        include:
          - { runner: macos-26, arch: arm64, rid: osx-arm64 }
          - { runner: macos-26-intel, arch: x86_64, rid: osx-x64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - run: bash native/rgfw/scripts/build-osx.sh ${{ matrix.arch }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.rid }}
          path: native/rgfw/runtimes/${{ matrix.rid }}
          if-no-files-found: error

  pack:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # Each artifact lands in its own runtimes/<rid>/ subdirectory.
      - uses: actions/download-artifact@v8
        with:
          path: native/rgfw/runtimes

      - name: Fail if the TAG version is already on NuGet.org
        run: |
          VERSION=$(tr -d '[:space:]' < native/rgfw/TAG)
          REVISION=$(tr -d '[:space:]' < native/rgfw/REVISION 2>/dev/null || true)
          [ -n "$REVISION" ] && VERSION="$VERSION.$REVISION"
          if curl -fsSL "https://api.nuget.org/v3-flatcontainer/alvorkit.rgfw.native/index.json" | grep -q "\"$VERSION\""; then
            echo "::error::AlvorKit.RGFW.Native $VERSION is already published — bump native/rgfw/TAG or REVISION."
            exit 1
          fi

      - run: dotnet build -c Release native/rgfw/AlvorKit.RGFW.Native.csproj

      - name: Generate bindings
        run: dotnet run --project scripts/AlvorKit.Script.Bindgen -- rgfw --strict

      - name: Pack bindings
        run: |
          dotnet build -c Release out/bindgen/AlvorKit.RGFW/AlvorKit.RGFW.csproj
          dotnet build -c Release out/bindgen/AlvorKit.RGFW.Backend/AlvorKit.RGFW.Backend.csproj -p:RestoreAdditionalProjectSources=${{ github.workspace }}/bin/AlvorKit.RGFW.Native/Release

      - uses: actions/upload-artifact@v7
        with:
          name: nupkg
          path: |
            bin/AlvorKit.RGFW.Native/Release/*.nupkg
            bin/AlvorKit.RGFW/Release/*.nupkg
            bin/AlvorKit.RGFW.Backend/Release/*.nupkg
          if-no-files-found: error

      - name: Publish to NuGet.org (push events only)
        if: github.event_name == 'push'
        run: |
          dotnet nuget push bin/AlvorKit.RGFW.Native/Release/*.nupkg --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push bin/AlvorKit.RGFW/Release/*.nupkg --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push bin/AlvorKit.RGFW.Backend/Release/*.nupkg --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

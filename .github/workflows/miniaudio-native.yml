name: miniaudio native package

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      [
        "native/miniaudio/TAG",
        "native/miniaudio/REVISION",
        "native/miniaudio/alvorkit.c",
        "native/miniaudio/miniaudio.c",
        "native/miniaudio/*.csproj",
        "native/miniaudio/scripts/**",
      ]

permissions:
  contents: read

jobs:
  build-windows:
    strategy:
      matrix:
        include:
          - { runner: windows-latest, arch: x64 }
          - { runner: windows-latest, arch: x86 }
          - { runner: windows-11-arm, arch: arm64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - run: pwsh native/miniaudio/scripts/build-win.ps1 -Arch ${{ matrix.arch }}
      - uses: actions/upload-artifact@v7
        with:
          name: win-${{ matrix.arch }}
          path: native/miniaudio/runtimes/win-${{ matrix.arch }}
          if-no-files-found: error

  build-linux:
    strategy:
      matrix:
        include:
          - { runner: ubuntu-24.04, rid: linux-x64 }
          - { runner: ubuntu-24.04-arm, rid: linux-arm64 }
          - { runner: ubuntu-24.04-arm, rid: linux-arm, args: arm }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - run: bash native/miniaudio/scripts/build-linux.sh ${{ matrix.args }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.rid }}
          path: native/miniaudio/runtimes/${{ matrix.rid }}
          if-no-files-found: error

  build-macos:
    strategy:
      matrix:
        include:
          - { runner: macos-26, arch: arm64, rid: osx-arm64 }
          - { runner: macos-26-intel, arch: x86_64, rid: osx-x64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - run: bash native/miniaudio/scripts/build-osx.sh ${{ matrix.arch }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.rid }}
          path: native/miniaudio/runtimes/${{ matrix.rid }}
          if-no-files-found: error

  pack:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      # Each artifact lands in its own runtimes/<rid>/ subdirectory.
      - uses: actions/download-artifact@v8
        with:
          path: native/miniaudio/runtimes

      - name: Fail if the TAG version is already on NuGet.org
        run: |
          VERSION=$(tr -d '[:space:]' < native/miniaudio/TAG)
          REVISION=$(tr -d '[:space:]' < native/miniaudio/REVISION 2>/dev/null || true)
          [ -n "$REVISION" ] && VERSION="$VERSION.$REVISION"
          if curl -fsSL "https://api.nuget.org/v3-flatcontainer/alvorkit.miniaudio.native/index.json" | grep -q "\"$VERSION\""; then
            echo "::error::AlvorKit.MiniAudio.Native $VERSION is already published — bump native/miniaudio/TAG or REVISION."
            exit 1
          fi

      - run: dotnet build -c Release native/miniaudio/AlvorKit.MiniAudio.Native.csproj

      - uses: actions/upload-artifact@v7
        with:
          name: nupkg
          path: bin/AlvorKit.MiniAudio.Native/Release/*.nupkg
          if-no-files-found: error

      - name: Publish to NuGet.org (push events only)
        if: github.event_name == 'push'
        run: dotnet nuget push bin/AlvorKit.MiniAudio.Native/Release/*.nupkg --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

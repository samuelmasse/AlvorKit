name: .NET

on:
  push:
  pull_request:

permissions: read-all

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build:
    name: build and test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Generate maths primitives
        run: dotnet run --project scripts/AlvorKit.Script.MathsGen

      - name: Generate bindings
        run: dotnet run --project scripts/AlvorKit.Script.Bindgen -- all --strict

      - name: Restore dependencies
        run: dotnet restore AlvorKit.slnx

      - name: Build
        run: dotnet build AlvorKit.slnx --no-restore

      - name: Test
        run: dotnet test AlvorKit.slnx --no-build --verbosity normal

  non_local_generated_packages_probe:
    name: probe build without local generated packages
    runs-on: ubuntu-24.04
    outputs:
      build_succeeded: ${{ steps.probe.outputs.build_succeeded }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      # A job that actually runs cannot conclude as skipped, so this probe turns
      # an informational failure into an output. The marker job below is then
      # skipped when the non-local generated-package build does not succeed.
      - name: Probe build without local generated packages
        id: probe
        shell: bash
        run: |
          skip_build() {
              local reason="$1"

              echo "build_succeeded=false" >> "$GITHUB_OUTPUT"
              {
                  echo "### Build without local generated packages"
                  echo
                  printf '%s\n' "$reason"
                  echo
                  echo "The visible non-local native binding build marker will be skipped."
              } >> "$GITHUB_STEP_SUMMARY"
          }

          set +e

          dotnet restore AlvorKit.slnx
          restore_status=$?
          if [ "$restore_status" -ne 0 ]; then
              skip_build "Skipped because \`dotnet restore AlvorKit.slnx\` failed without local generated packages."
              exit 0
          fi

          dotnet build AlvorKit.slnx --no-restore
          build_status=$?
          if [ "$build_status" -ne 0 ]; then
              skip_build "Skipped because \`dotnet build AlvorKit.slnx --no-restore\` failed without local generated packages."
              exit 0
          fi

          echo "build_succeeded=true" >> "$GITHUB_OUTPUT"
          {
              echo "### Build without local generated packages"
              echo
              echo "The solution built successfully without local generated packages."
          } >> "$GITHUB_STEP_SUMMARY"

  non_local_generated_packages_build:
    name: build without local generated packages
    needs: non_local_generated_packages_probe
    if: ${{ needs.non_local_generated_packages_probe.outputs.build_succeeded == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Confirm non-local native binding build
        run: echo "The probe job built the solution without local generated packages successfully."

# Builds and publishes the managed packages generated from C headers.
#
# Release rule:
# - automatic standalone binding releases only run when version/BINDING_REVISION changes.
# - native package releases are standalone in native-packages.yml and never
#   publish managed bindings.
# - publish bindings after the referenced native package version exists on NuGet.
#
# Manual runs are artifact-oriented and do not publish to NuGet.org.
name: C header bindings packages

on:
  # Manual dispatch can build one binding package or all C-header bindings.
  workflow_dispatch:
    inputs:
      library:
        description: Binding library to build
        required: true
        default: all
        type: choice
        options:
          - all
          - freetype
          - glfw
          - miniaudio
          - xxhash

  # Push releases are intentionally limited to binding revision files.
  # Changes to bindgen code/config alone should not publish unless a binding
  # version marker is bumped.
  push:
    branches: [main]
    paths:
      [
        "native/freetype/version/BINDING_REVISION",
        "native/glfw/version/BINDING_REVISION",
        "native/miniaudio/version/BINDING_REVISION",
        "native/xxhash/version/BINDING_REVISION",
      ]

# The workflow only needs repository reads. NuGet publishing is authenticated
# through NUGET_API_KEY rather than GitHub write permissions.
permissions:
  contents: read

# Package versions are immutable; serialize releases per ref instead of canceling
# older runs mid-publish.
concurrency:
  group: c-header-bindings-${{ github.ref }}
  cancel-in-progress: false

# Keep .NET command noise down in every job.
env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  # Builds a dynamic matrix of binding packages to process. This keeps a freetype
  # version/BINDING_REVISION bump from generating all bindings.
  detect:
    runs-on: ubuntu-24.04
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
      has_packages: ${{ steps.detect.outputs.has_packages }}
    steps:
      # Fetch full history so push runs can inspect exactly which files changed.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Selects libraries by manual input or changed version/BINDING_REVISION files.
      - name: Detect binding packages to release
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          # Manual runs use the explicit input. Push runs derive selection from
          # changed version/BINDING_REVISION marker files.
          selected=()
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            selection="${{ inputs.library }}"
            if [[ "$selection" == "all" ]]; then
              selected=(freetype glfw miniaudio xxhash)
            else
              selected=("$selection")
            fi
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
              mapfile -t changed < <(git diff-tree --no-commit-id --name-only -r "$head")
            else
              mapfile -t changed < <(git diff --name-only "$base" "$head")
            fi

            changed_any() {
              local path="$1"
              local file
              for file in "${changed[@]}"; do
                [[ "$file" == "$path" ]] && return 0
              done
              return 1
            }

            # version/BINDING_REVISION means "publish a new managed binding version".
            for library in freetype glfw miniaudio xxhash; do
              if changed_any "native/${library}/version/BINDING_REVISION"; then
                selected+=("$library")
              fi
            done
          fi

          # Map each selected library to its package IDs and generated project
          # names. The pack job uses this JSON as its matrix.
          objects=()
          for library in "${selected[@]}"; do
            case "$library" in
              freetype)
                id="alvorkit.freetype"
                native_id="alvorkit.freetype.native"
                api_project="AlvorKit.FreeType"
                backend_project="AlvorKit.FreeType.Backend"
                ;;
              glfw)
                id="alvorkit.glfw"
                native_id="alvorkit.glfw.native"
                api_project="AlvorKit.GLFW"
                backend_project="AlvorKit.GLFW.Backend"
                ;;
              miniaudio)
                id="alvorkit.miniaudio"
                native_id="alvorkit.miniaudio.native"
                api_project="AlvorKit.MiniAudio"
                backend_project="AlvorKit.MiniAudio.Backend"
                ;;
              xxhash)
                id="alvorkit.xxhash"
                native_id="alvorkit.xxhash.native"
                api_project="AlvorKit.XxHash"
                backend_project="AlvorKit.XxHash.Backend"
                ;;
              *)
                echo "::error::Unknown binding library '$library'."
                exit 1
                ;;
            esac

            objects+=("$(jq -cn \
              --arg selection "$library" \
              --arg dir "native/$library/version" \
              --arg id "$id" \
              --arg native_id "$native_id" \
              --arg api_project "$api_project" \
              --arg backend_project "$backend_project" \
              '{selection:$selection,dir:$dir,id:$id,native_id:$native_id,api_project:$api_project,backend_project:$backend_project}')")
          done

          # Emit compact JSON for fromJson(...) and a simple boolean for job
          # conditions.
          packages="$(printf '%s\n' "${objects[@]}" | jq -s -c '.')"
          echo "packages=$packages" >> "$GITHUB_OUTPUT"
          if [[ "$packages" == "[]" ]]; then
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
            echo "No standalone binding package version files changed."
          else
            echo "has_packages=true" >> "$GITHUB_OUTPUT"
            echo "Selected packages: $(jq -r 'map(.selection) | join(", ")' <<< "$packages")"
          fi

  # Generates, packs, artifacts, and optionally publishes the selected bindings.
  pack:
    needs: [detect]
    if: needs.detect.outputs.has_packages == 'true'
    timeout-minutes: 30
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect.outputs.packages) }}

    steps:
      # Check out metadata/source and install the SDK used by the bindgen tool.
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      # Compute the native package version and binding package version from
      # marker files. Push runs fail if the binding version is already published;
      # manual runs simply skip that package.
      - name: Compute package versions
        id: versions
        shell: bash
        run: |
          set -euo pipefail
          tag="$(tr -d '[:space:]' < "${{ matrix.package.dir }}/TAG")"
          native_revision="$(tr -d '[:space:]' < "${{ matrix.package.dir }}/REVISION" 2>/dev/null || true)"
          binding_revision="$(tr -d '[:space:]' < "${{ matrix.package.dir }}/BINDING_REVISION" 2>/dev/null || true)"
          [[ -z "$binding_revision" ]] && binding_revision="$native_revision"
          native_version="$tag"
          binding_version="$tag"
          [[ -n "$native_revision" ]] && native_version="${native_version}.${native_revision}"
          [[ -n "$binding_revision" ]] && binding_version="${binding_version}.${binding_revision}"
          echo "native=$native_version" >> "$GITHUB_OUTPUT"
          echo "binding=$binding_version" >> "$GITHUB_OUTPUT"

          # NuGet versions are immutable. Push releases must use a new binding
          # version; manual runs can still act as dry runs for unpublished ones.
          versions="$(curl -fsSL "https://api.nuget.org/v3-flatcontainer/${{ matrix.package.id }}/index.json" || echo '{"versions":[]}')"
          if jq -e --arg version "$binding_version" '.versions | index($version)' <<< "$versions" > /dev/null; then
            if [[ "${{ github.event_name }}" == "push" ]]; then
              echo "::error::${{ matrix.package.id }} ${binding_version} is already published - bump ${{ matrix.package.dir }}/BINDING_REVISION."
              exit 1
            fi
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "${{ matrix.package.id }} ${binding_version} is already published; skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # The generated backend references the native runtime package, so verify
      # that the required native package version already exists before generation.
      - name: Verify native package is published
        if: steps.versions.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          versions="$(curl -fsSL "https://api.nuget.org/v3-flatcontainer/${{ matrix.package.native_id }}/index.json" || echo '{"versions":[]}')"
          if ! jq -e --arg version "${{ steps.versions.outputs.native }}" '.versions | index($version)' <<< "$versions" > /dev/null; then
            echo "::error::${{ matrix.package.native_id }} ${{ steps.versions.outputs.native }} is not on NuGet.org yet."
            exit 1
          fi

      # Run bindgen in strict mode so missing exports, stale shims, layout issues,
      # and parser problems fail the release.
      - name: Generate bindings
        if: steps.versions.outputs.skip != 'true'
        run: dotnet run --project scripts/AlvorKit.Script.Bindgen -- ${{ matrix.package.selection }} --strict

      # Pack both generated projects for this library.
      - name: Pack bindings
        if: steps.versions.outputs.skip != 'true'
        run: |
          dotnet pack -c Release out/bindgen/${{ matrix.package.api_project }}/${{ matrix.package.api_project }}.csproj
          dotnet pack -c Release out/bindgen/${{ matrix.package.backend_project }}/${{ matrix.package.backend_project }}.csproj

      # Upload .nupkg files for visibility and manual review.
      - uses: actions/upload-artifact@v7
        if: steps.versions.outputs.skip != 'true'
        with:
          name: ${{ matrix.package.selection }}-bindings-nupkg
          path: |
            bin/${{ matrix.package.api_project }}/Release/*.nupkg
            bin/${{ matrix.package.backend_project }}/Release/*.nupkg
          if-no-files-found: error

      # Push-triggered runs publish; manual runs stop after artifact upload.
      - name: Publish to NuGet.org
        if: steps.versions.outputs.skip != 'true' && github.event_name == 'push'
        run: |
          dotnet nuget push bin/${{ matrix.package.api_project }}/Release/*.nupkg --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push bin/${{ matrix.package.backend_project }}/Release/*.nupkg --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

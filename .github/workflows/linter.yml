name: Lint Code Base

on:
  push:
  pull_request:

permissions: read-all

jobs:
  build:
    name: Lint Code Base
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Run lint coordinator
        run: dotnet run --project scripts/AlvorKit.Script.Lint

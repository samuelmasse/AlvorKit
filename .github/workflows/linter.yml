name: Lint Code Base

on:
  push:
  pull_request:

permissions: read-all

jobs:
  build:
    name: Lint Code Base
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Enable local bindings
        run: cp AlvorKit.Local.props.example AlvorKit.Local.props

      - name: Generate bindings
        run: dotnet run --project scripts/AlvorKit.Script.Bindgen -- all --strict

      - name: Build source generators
        run: dotnet build src/AlvorKit.ECS.Generator/AlvorKit.ECS.Generator.csproj

      - name: Run lint coordinator
        run: dotnet run --project scripts/AlvorKit.Script.Lint

name: CI

on:
  push:
  pull_request:

permissions: read-all

jobs:
  ci:
    name: Build and lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          path: AlvorStarter
      - uses: actions/checkout@v7
        with:
          repository: samuelmasse/AlvorKit
          path: AlvorKit
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: ga
      - name: Generate AlvorKit sources
        working-directory: AlvorKit
        run: |
          dotnet run --project scripts/AlvorKit.Script.MathsGen
          dotnet run --project scripts/AlvorKit.Script.Bindgen -- all --strict
      - name: Build
        run: |
          dotnet restore AlvorStarter/AlvorStarter.slnx
          dotnet build AlvorStarter/AlvorStarter.slnx --no-restore
      - name: Lint
        working-directory: AlvorKit
        run: dotnet run --project scripts/AlvorKit.Script.Lint -- --repo-root ../AlvorStarter
